<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Russell's Garage | Contact</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- =========================
       HEADER + NAVIGATION
  ========================== -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html" aria-label="Go to homepage">
        <img src="images/logo.png" alt="Russell's Garage logo" />
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="inventory.html">Inventory</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <main class="container contact-grid">
    <section class="contact-left" aria-label="Contact form">
      <div class="card">
        <h1>Contact Us</h1>
        <form action="#" method="post">
          <label for="name">Name
            <input id="name" name="name" type="text" placeholder="Enter your name" required />
          </label>

          <label for="email">Email
            <input id="email" name="email" type="email" placeholder="Enter your email" required />
          </label>

          <label for="message">Message
            <textarea id="message" name="message" rows="6" placeholder="Enter your message" required></textarea>
          </label>

          <button class="btn" type="submit">Submit</button>
        </form>
      </div>
    </section>

    <aside class="contact-right" aria-label="Business contact info">
      <div class="card">
        <h2>Our Details</h2>
        <p>123 Real CarDealership Rd</p>
        <p>(123) 456-7890</p>
        <p>info@russellsgarage.com</p>
        <p>Mon–Fri: 9 AM – 6 PM</p>
        <p>Sat: 10 AM – 4 PM</p>

        <div class="map-placeholder">Map Placeholder</div>
      </div>
    </aside>
  </main>

  <!-- =========================
       FOOTER
  ========================== -->
  <footer class="site-footer">
    <div class="container footer-inner">
      <div class="footer-left">
        <h4>Russell's Garage</h4>
        <p><a href="about.html">About</a></p>
        <p><a href="contact.html">Contact</a></p>
      </div>

      <div class="store-badges" aria-label="App store badges">
        <img src="images/google-play.png" alt="Get it on Google Play" />
        <img src="images/app-store.png" alt="Download on the App Store" />
      </div>

      <div class="footer-right" aria-label="Footer logo">
        <img src="images/logo.png" alt="Russell's Garage logo" />
      </div>
    </div>
  </footer>

</body>
</html>
