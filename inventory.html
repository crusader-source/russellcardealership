<!-- Ahmad Pages-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Russell's Garage | Inventory</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <!-- =========================
       HEADER + NAVIGATION
  ========================== -->
  <header class="site-header">
    <div class="header-inner">
      <a class="brand" href="index.html">
       <img src="images/logo.png" alt="Russell's Garage logo">
       <span class="brand-name">Russell's Garage</span>
      </a>

      <nav class="main-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="inventory.html">Inventory</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <!-- =========================
       MAIN CONTENT
  ========================== -->
  <main class="container">
    <section class="hero" aria-label="Inventory header">
      <div class="card">
        <h1>Inventory List</h1>
        <p>Search and filter our current vehicles.</p>
      </div>
    </section>

    <form class="filters" action="#" method="get" aria-label="Inventory filters">
      <input type="search" name="search" placeholder="Search by..." aria-label="Search inventory" />

      <select name="make" aria-label="Filter by make">
        <option value="">Filter by Make</option>
        <option value="toyota">Toyota</option>
        <option value="honda">Honda</option>
        <option value="ford">Ford</option>
        <option value="nissan">Nissan</option>
      </select>

      <select name="price" aria-label="Filter by price">
        <option value="">Filter by Price</option>
        <option value="0-20000">$0 - $20,000</option>
        <option value="20001-35000">$20,001 - $35,000</option>
        <option value="35001-50000">$35,001 - $50,000</option>
        <option value="50001+">$50,001+</option>
      </select>

      <button class="btn" type="submit">Apply Filters</button>
    </form>

    <section class="inventory-grid" aria-label="Vehicle inventory grid">
      <article class="inventory-card">
        <img  src="images/camry.jpg" alt="Toyota Camry" />
        <h4>Toyota Camry</h4>
        <p>Price: $25,000</p>
        <a class="btn" href="car-details.html">View Details</a>
      </article>

      <article class="inventory-card">
        <img src="images/civic.jpg" alt="Honda Civic" />
        <h4>Honda Civic</h4>
        <p>Price: $22,000</p>
        <a class="btn" href="car-details.html">View Details</a>
      </article>

      <article class="inventory-card">
        <img src="images/f150.jpg" alt="Ford F-150">
        <h4>Ford F-150</h4>
        <p>Price: $35,000</p>
        <a class="btn" href="car-details.html">View Details</a>
      </article>
    </section>
  </main>

  <!-- =========================
       FOOTER
  ========================== -->
<footer class="site-footer">
  <div class="container footer-inner">
    <div class="footer-left">
      <h4>Russell's Garage</h4>
      <p><a href="about.html">About</a></p>
      <p><a href="contact.html">Contact</a></p>
    </div>

    <div class="store-badges" aria-label="App store badges">
      <img src="images/install.png" alt="Get it on Google Play" />
    </div>

    <div class="footer-right">
      <img class="footer-logo" src="images/logo.png" alt="Russell's Garage logo" />
    </div>
  </div>
</footer>

</body>
</html>
